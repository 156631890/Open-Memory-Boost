name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile package
        run: python -m compileall memory_boost tests
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Smoke test CLI
        run: python -m memory_boost init --store ${{ github.workspace }}\\.ci-memory\\memory.md
